"string">recurse =&gt;</span> <span class="number">1</span>});</span><br><span class="line"></span><br><span class="line"><span class="comment"># タイムゾーンを取得</span></span><br><span class="line"><span class="keyword">my</span> $tm        = Time::Moment-&gt;now;</span><br><span class="line"><span class="keyword">my</span> $offset    = $tm-&gt;offset;</span><br><span class="line"><span class="keyword">my</span> $jp_offset = <span class="number">540</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment"># 記事から時間を取得して、名称変更</span></span><br><span class="line"><span class="keyword">while</span> (<span class="keyword">my</span> $post = $iterator-&gt;()) {</span><br><span class="line">    <span class="keyword">next</span> <span class="keyword">unless</span> $post-&gt;is_file;</span><br><span class="line">    <span class="keyword">my</span> ($yaml, $after) = <span class="keyword">split</span> <span class="regexp">/\n---/</span>, $post-&gt;slurp_utf8, <span class="number">2</span>;</span><br><span class="line">    <span class="keyword">my</span> $info = YAML::Load($yaml);</span><br><span class="line"></span><br><span class="line">    <span class="keyword">my</span> $modified;</span><br><span class="line"></span><br><span class="line">    <span class="comment"># ISO8601を持っていない場合はdateからISOを作成</span></span><br><span class="line">    <span class="keyword">unless</span> (<span class="keyword">exists</span> $info-&gt;{iso8601}) {</span><br><span class="line"></span><br><span class="line">        <span class="comment"># 存在しなければ今書いたことにする</span></span><br><span class="line">        <span class="keyword">if</span> (!<span class="keyword">exists</span> $info-&gt;{date}) {</span><br><span class="line">            $info-&gt;{iso8601} = Time::Moment-&gt;now-&gt;to_string;</span><br><span class="line">        }</span><br><span class="line"></span><br><span class="line">        <span class="comment"># すでに変換済みであればそのまま渡す</span></span><br><span class="line">        <span class="keyword">elsif</span> (-<span class="number">1</span> &lt; <span class="keyword">index</span>($info-&gt;{date}, <span class="string">'T'</span>)) {</span><br><span class="line">            $info-&gt;{iso8601} = $info-&gt;{date};</span><br><span class="line">        }</span><br><span class="line"></span><br><span class="line">        <span class="comment"># date があれば iso8601 を作成</span></span><br><span class="line">        <span class="keyword">else</span> {</span><br><span class="line">            <span class="keyword">my</span> $date     = <span class="keyword">join</span>(<span class="string">'T'</span>, <span class="keyword">split</span>(<span class="regexp">/\s/</span>, $info-&gt;{date})) . <span class="string">'Z'</span>;</span><br><span class="line">            <span class="keyword">my</span> $tm       = Time::Moment-&gt;from_string($date);</span><br><span class="line">            <span class="keyword">my</span> $new_date = $tm-&gt;with_offset_same_local($offset);</span><br><span class="line">            $info-&gt;{iso8601} = $new_date-&gt;to_string;</span><br><span class="line">        }</span><br><span class="line"></span><br><span class="line">        <span class="comment"># date はURLのために日本時間へ統一</span></span><br><span class="line">        <span class="keyword">my</span> $tm       = Time::Moment-&gt;from_string($info-&gt;{iso8601});</span><br><span class="line">        <span class="keyword">my</span> $url_date = $tm-&gt;with_offset_same_instant($jp_offset);</span><br><span class="line">        $info-&gt;{date} = $url_date-&gt;strftime(<span class="string">'%F %T'</span>);</span><br><span class="line">        $modified = <span class="number">1</span>;</span><br><span class="line">    }</span><br><span class="line"></span><br><span class="line">    <span class="comment"># # 本文に文字列が含まれていたらタグを追加</span></span><br><span class="line">    <span class="comment"># my $target = 'perl';</span></span><br><span class="line">    <span class="comment"># my $ta sts_dir, <span class="string">qq{$path.md}</span>)-&gt;absolute;</span><br><span class="line">    $new_post-&gt;parent-&gt;mkpath;</span><br><span class="line">    $post-&gt;move($new_post-&gt;stringify);</span><br><span class="line">}</span><br></pre></td></tr></table></figure>
