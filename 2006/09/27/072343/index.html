container"><div class="post"><article class="post-block"><h1 class="post-title">実行順序</h1><div class="post-info"><div class="post-date"><h6 class="ui header"><i class="calendar icon"></i><div class="content">2006年9月27日</div></h6></div></div><div class="post-content"><div class="entry-body"><br>                                 <p>見るともなく古いファイルを見ていたら、変なコードを見つけた。</p><br><br><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line">sub get_1 &#123;print &apos;a&apos;; 1;&#125;</span><br><span class="line">sub get_2 &#123;print &apos;b&apos;; 2;&#125;</span><br><span class="line">sub get_3 &#123;print &apos;c&apos;; 3;&#125;</span><br><span class="line">print get_1;</span><br><span class="line">print get_2;</span><br><span class="line">print get_3;</span><br><span class="line">print &quot;n&quot;;</span><br><span class="line">print &quot;-----n&quot;;</span><br><span class="line">print get_1,</span><br><span class="line">      get_2,</span><br><span class="line">      get_3,</span><br><span class="line">      &quot;n&quot;;</span><br><span class="line">print &quot;-----n&quot;;</span><br></pre></td></tr></table></figure><br><br><p>なんだろう？と思って実行してみてびっくりした。</p><br><br>                                 <p>どこかで見た記憶があったので探してみたら、「<a href="http://d.hatena.ne.jp/hiratara/20060424/1145888188" target="_blank" rel="noopener">a geek - perlの評価順</a>」だった。</p><br><br><p>同じネタで何度もびっくりしてしまうのは、記憶力の欠如ですか？</p><br>                              </div>
